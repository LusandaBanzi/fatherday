<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bafana Bafana — Road to the Round of 32</title>
<meta name="description" content="An animated 3D tribute celebrating Bafana Bafana's qualification to the FIFA World Cup Round of 16." />
<style>
  :root{
    --green:#007a4d;        /* SA / Bafana green */
    --green-deep:#004d30;
    --gold:#ffb612;         /* Bafana gold */
    --red:#de3831;
    --blue:#002395;
    --white:#ffffff;
    --black:#0a0a0a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Inter','Helvetica Neue',Arial,sans-serif}
  #stage{position:fixed;inset:0}
  canvas{display:block}

  /* Top bar */
  .hud{
    position:absolute;inset:0;pointer-events:none;
    display:grid;grid-template-rows:auto 1fr auto;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 32px;
    background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);
  }
  .crest{display:flex;align-items:center;gap:14px}
  .crest .ball{
    width:46px;height:46px;border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%,#fff 0 18%,transparent 19%),
      radial-gradient(circle at 70% 65%,#000 0 12%,transparent 13%),
      radial-gradient(circle at 30% 75%,#000 0 10%,transparent 11%),
      radial-gradient(circle at 75% 25%,#000 0 9%,transparent 10%),
      #fff;
    box-shadow:0 6px 24px rgba(255,182,18,.35),inset 0 0 0 2px #000;
    animation:spin 6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .crest h1{font-size:18px;letter-spacing:.18em;text-transform:uppercase;font-weight:800}
  .crest h1 span{color:var(--gold)}
  .badge{
    pointer-events:auto;
    border:1px solid rgba(255,255,255,.25);
    padding:8px 14px;border-radius:999px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    background:rgba(0,122,77,.35);backdrop-filter:blur(8px);
  }

  /* Center title */
  .center{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 24px;
    position:relative;
    z-index:5;
  }
  .kicker{
    font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);
    opacity:0;transform:translateY(20px);
    animation:rise .9s .3s forwards cubic-bezier(.2,.7,.2,1);
  }
  .title{
    margin-top:10px;
    font-size:clamp(48px,9vw,140px);
    line-height:.95;font-weight:900;letter-spacing:-.02em;
    background:linear-gradient(180deg,#fff 0%, #ffd766 60%, var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 12px 40px rgba(0,0,0,.55);
    opacity:0;transform:translateY(40px) scale(.96);
    animation:rise 1.2s .55s forwards cubic-bezier(.2,.7,.2,1);
  }
  .sub{
    margin-top:14px;font-size:clamp(14px,1.6vw,18px);letter-spacing:.3em;text-transform:uppercase;
    color:#eaeaea;opacity:0;animation:rise 1s 1s forwards cubic-bezier(.2,.7,.2,1);
  }
  @keyframes rise{to{opacity:1;transform:none}}

  /* Bottom ticker + player reel */
  .bottom{
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;
    padding:24px 32px 28px;
    background:linear-gradient(0deg,rgba(0,0,0,.7),transparent);
  }
  .reel{
    pointer-events:auto;
    display:flex;gap:14px;align-items:center;
  }
  .card{
    width:120px;height:150px;border-radius:14px;overflow:hidden;position:relative;
    background:linear-gradient(160deg,var(--green) 0%,var(--green-deep) 60%,#000 100%);
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.08);
    transform:translateY(20px);opacity:0;
    animation:rise .8s forwards cubic-bezier(.2,.7,.2,1);
  }
  .card:nth-child(1){animation-delay:1.3s}
  .card:nth-child(2){animation-delay:1.45s}
  .card:nth-child(3){animation-delay:1.6s}
  .card:nth-child(4){animation-delay:1.75s}
  .card:nth-child(5){animation-delay:1.9s}
  .card .num{
    position:absolute;top:8px;left:10px;font-weight:900;font-size:14px;color:var(--gold);
    letter-spacing:.2em;
  }
  .card .name{
    position:absolute;bottom:8px;left:10px;right:10px;
    font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  .card .role{position:absolute;bottom:24px;left:10px;font-size:9px;letter-spacing:.25em;color:#ffd766;text-transform:uppercase}
  .card svg{position:absolute;inset:auto 0 22px 0;margin:auto;display:block;width:90%;height:60%}
  .card::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55) 100%);
  }

  .scoreboard{
    pointer-events:auto;
    display:flex;align-items:center;gap:14px;color:#fff;
    background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);
    padding:10px 16px;border-radius:14px;backdrop-filter:blur(8px);
    font-weight:800;letter-spacing:.18em;text-transform:uppercase;font-size:12px;
  }
  .scoreboard .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.4);opacity:.6}}

  /* GOAL flash */
  .goal{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;
    opacity:0;
  }
  .goal span{
    font-size:clamp(120px,22vw,360px);font-weight:900;letter-spacing:-.04em;
    background:linear-gradient(180deg,#fff,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 30px 80px rgba(255,182,18,.55);
    transform:scale(.6);
  }
  .goal.show{animation:goalPop 2s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes goalPop{
    0%{opacity:0;transform:scale(.6) rotate(-3deg)}
    20%{opacity:1}
    60%{opacity:1;transform:scale(1.05) rotate(0)}
    100%{opacity:0;transform:scale(1.15) rotate(2deg)}
  }

  /* Replay loop hint */
  .replay{
    position:absolute;right:24px;bottom:200px;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    color:#bbb;opacity:.6;pointer-events:none;
  }

  
/* =========================
   LEFT & RIGHT IMAGE SLIDERS
   ========================= */
.slider{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:180px;
    height:80vh;
    overflow:hidden;
    z-index:2;
}
.left-slider{left:20px;}
.right-slider{right:20px;}

.slider img{
    position:absolute;
    width:160px;
    height:200px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid rgba(255,255,255,0.8);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    opacity:0;
    left:10px;
    animation:sliderAnimation 18s linear infinite;
}

.left-slider img:nth-child(1){animation-delay:0s;}
.left-slider img:nth-child(2){animation-delay:3s;}
.left-slider img:nth-child(3){animation-delay:6s;}
.left-slider img:nth-child(4){animation-delay:9s;}
.left-slider img:nth-child(5){animation-delay:12s;}
.left-slider img:nth-child(6){animation-delay:15s;}

.right-slider img:nth-child(1){animation-delay:0s;}
.right-slider img:nth-child(2){animation-delay:3s;}
.right-slider img:nth-child(3){animation-delay:6s;}
.right-slider img:nth-child(4){animation-delay:9s;}
.right-slider img:nth-child(5){animation-delay:12s;}
.right-slider img:nth-child(6){animation-delay:15s;}

@keyframes sliderAnimation{
    0%{opacity:0;transform:translateX(100px) scale(0.8);}
    8%{opacity:1;transform:translateX(0) scale(1);}
    25%{opacity:1;transform:translateX(0) scale(1);}
    33%{opacity:0;transform:translateX(-100px) scale(0.8);}
    100%{opacity:0;transform:translateX(-100px) scale(0.8);}
}


@media (max-width:720px){
    .card{width:92px;height:120px}
    .card .name{font-size:10px}
    .topbar{padding:16px 18px}
    .bottom{padding:18px;grid-template-columns:1fr;gap:14px}
    .scoreboard{justify-self:start}
  }
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="hud">
    <header class="topbar">
      <div class="crest">
        <div class="ball" aria-hidden="true"></div>
        <h1>BAFANA <span>BAFANA</span></h1>
      </div>
      <div class="badge">FIFA World Cup • Round of 32</div>
    </header>

    <section class="center">
      <div class="kicker">Mzansi, we are through</div>
      <div class="title">QUALIFIED</div>
      <div class="sub">South Africa • Round of 32</div>
    </section>
	
	<!-- LEFT SLIDER -->

<div class="slider left-slider">
    <img src="mbokazi.jpg">
    <img src="apollis.jpg">
    <img src="williams.jpg">
    <img src="ratomo.jpg">
    <img src="makgopa.jpg">
    <img src="maseko.jpg">
</div>

<!-- RIGHT SLIDER -->

<div class="slider right-slider">
    <img src="broos.jpg">
    <img src="moremi.jpg">
    <img src="sebelebele.jpg">
    <img src="okon.jpg">
    <img src="cross.jpg">
    <img src="mokoena.jpg">
</div>

    <footer class="bottom">
      <div class="reel" id="reel"></div>
      <div class="scoreboard"><span class="dot"></span><span>LIVE • RSA advances to RO32</span></div>
    </footer>
  </div>

  
  <div class="replay">auto-loop • broadcast cut</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ---------- Scene ---------- */
const stage = document.getElementById('stage');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x001a10, 18, 60);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5.5, 16);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
stage.appendChild(renderer.domElement);

/* ---------- Lighting (stadium feel) ---------- */
scene.add(new THREE.HemisphereLight(0xbfe9d0, 0x0a1a12, 0.55));

const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(8,14,8); key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-20;key.shadow.camera.right=20;
key.shadow.camera.top=20;key.shadow.camera.bottom=-20;
scene.add(key);

const goldRim = new THREE.DirectionalLight(0xffb612, 1.1);
goldRim.position.set(-10,6,-6);
scene.add(goldRim);

const greenFill = new THREE.PointLight(0x00b870, 1.4, 30);
greenFill.position.set(0,4,-4);
scene.add(greenFill);

/* ---------- Pitch ---------- */
const pitchGeo = new THREE.CircleGeometry(40, 64);
const pitchMat = new THREE.MeshStandardMaterial({color:0x046a3b, roughness:.95, metalness:0});
const pitch = new THREE.Mesh(pitchGeo, pitchMat);
pitch.rotation.x = -Math.PI/2;
pitch.receiveShadow = true;
scene.add(pitch);

// Mowing stripes
for(let i=-18;i<=18;i+=3){
  const stripe = new THREE.Mesh(
    new THREE.PlaneGeometry(60,1.5),
    new THREE.MeshStandardMaterial({color: (i/3)%2===0?0x055f36:0x067a44, roughness:1})
  );
  stripe.rotation.x = -Math.PI/2;
  stripe.position.set(0,0.01,i);
  scene.add(stripe);
}

// Center line + circle
const lineMat = new THREE.MeshBasicMaterial({color:0xffffff});
const cLine = new THREE.Mesh(new THREE.PlaneGeometry(60,.15), lineMat);
cLine.rotation.x=-Math.PI/2; cLine.position.y=.02; scene.add(cLine);
const ring = new THREE.Mesh(new THREE.RingGeometry(3,3.1,64), lineMat);
ring.rotation.x=-Math.PI/2; ring.position.y=.02; scene.add(ring);

/* ---------- Crowd backdrop (color stripes) ---------- */
const palette = [0x007a4d,0xffb612,0xffffff,0x000000,0xde3831,0x002395];
for(let i=0;i<320;i++){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(.45,.45,.45),
    new THREE.MeshStandardMaterial({color:palette[i%palette.length], emissive:palette[i%palette.length], emissiveIntensity:.25, roughness:.6})
  );
  const angle = (i/320)*Math.PI*2;
  const r = 22 + Math.random()*4;
  m.position.set(Math.cos(angle)*r, 1.2+Math.random()*4, Math.sin(angle)*r);
  m.userData.baseY = m.position.y;
  m.userData.phase = Math.random()*Math.PI*2;
  scene.add(m);
}

/* ---------- 3D cartoon player ---------- */
function makePlayer(jerseyColor=0x007a4d, shortColor=0xffb612, skin=0x6b3a1a, number="10"){
  const g = new THREE.Group();

  const skinMat = new THREE.MeshStandardMaterial({color:skin, roughness:.7});
  const jersey = new THREE.MeshStandardMaterial({color:jerseyColor, roughness:.6});
  const shorts = new THREE.MeshStandardMaterial({color:shortColor, roughness:.7});
  const socks  = new THREE.MeshStandardMaterial({color:0xffffff, roughness:.6});
  const boots  = new THREE.MeshStandardMaterial({color:0x111111, roughness:.4, metalness:.3});

  // Body
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(.55,1.1,6,12), jersey);
  torso.position.y = 1.9; torso.castShadow=true; g.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(.42,24,24), skinMat);
  head.position.y = 3.0; head.castShadow=true; g.add(head);

  // Eyes
  const eyeMat = new THREE.MeshBasicMaterial({color:0xffffff});
  const pupMat = new THREE.MeshBasicMaterial({color:0x111111});
  for(const x of [-.14,.14]){
    const e = new THREE.Mesh(new THREE.SphereGeometry(.08,12,12), eyeMat);
    e.position.set(x,3.05,.36); g.add(e);
    const p = new THREE.Mesh(new THREE.SphereGeometry(.04,12,12), pupMat);
    p.position.set(x,3.05,.42); g.add(p);
  }
  // Smile
  const smile = new THREE.Mesh(new THREE.TorusGeometry(.12,.025,8,16,Math.PI), new THREE.MeshBasicMaterial({color:0x111111}));
  smile.position.set(0,2.85,.38); smile.rotation.z=Math.PI;
  g.add(smile);

  // Number patch
  const canvas = document.createElement('canvas');
  canvas.width=128;canvas.height=128;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffb612';ctx.fillRect(0,0,128,128);
  ctx.fillStyle='#000';ctx.font='900 90px Inter,Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(number,64,72);
  const tex = new THREE.CanvasTexture(canvas);
  const num = new THREE.Mesh(new THREE.PlaneGeometry(.5,.5), new THREE.MeshBasicMaterial({map:tex,transparent:true}));
  num.position.set(0,2.0,.57); g.add(num);

  // Arms
  const armGeo = new THREE.CapsuleGeometry(.16,.9,6,10);
  const armL = new THREE.Mesh(armGeo, skinMat); armL.position.set(-.75,2.05,0); armL.castShadow=true; g.add(armL);
  const armR = new THREE.Mesh(armGeo, skinMat); armR.position.set( .75,2.05,0); armR.castShadow=true; g.add(armR);
  g.userData.armL = armL; g.userData.armR = armR;

  // Shorts
  const sh = new THREE.Mesh(new THREE.CylinderGeometry(.55,.5,.5,16), shorts);
  sh.position.y=1.2; g.add(sh);

  // Legs
  const legGeo = new THREE.CapsuleGeometry(.22,.9,6,10);
  const legL = new THREE.Mesh(legGeo, skinMat); legL.position.set(-.27,.55,0); legL.castShadow=true; g.add(legL);
  const legR = new THREE.Mesh(legGeo, skinMat); legR.position.set( .27,.55,0); legR.castShadow=true; g.add(legR);
  g.userData.legL = legL; g.userData.legR = legR;

  // Socks + boots
  const sockL = new THREE.Mesh(new THREE.CylinderGeometry(.23,.23,.3,12), socks); sockL.position.set(-.27,.12,0); g.add(sockL);
  const sockR = new THREE.Mesh(new THREE.CylinderGeometry(.23,.23,.3,12), socks); sockR.position.set( .27,.12,0); g.add(sockR);
  const bootL = new THREE.Mesh(new THREE.BoxGeometry(.35,.18,.55), boots); bootL.position.set(-.27,-.02,.1); g.add(bootL);
  const bootR = new THREE.Mesh(new THREE.BoxGeometry(.35,.18,.55), boots); bootR.position.set( .27,-.02,.1); g.add(bootR);

  return g;
}

const players = [];
const lineup = [
  {jersey:0x007a4d, shorts:0xffb612, num:"10", x:-4, skin:0x5a2d10},
  {jersey:0x007a4d, shorts:0xffb612, num:"7",  x:-1.5, skin:0x7a4422},
  {jersey:0x007a4d, shorts:0xffb612, num:"9",  x: 1.5, skin:0x4a2208},
  {jersey:0x007a4d, shorts:0xffb612, num:"11", x: 4,   skin:0x6b3a1a},
];
lineup.forEach(p=>{
  const m = makePlayer(p.jersey,p.shorts,p.skin,p.num);
  m.position.set(p.x,0,0);
  m.userData.basePhase = Math.random()*Math.PI*2;
  scene.add(m); players.push(m);
});

/* ---------- Ball ---------- */
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(.35,32,32),
  new THREE.MeshStandardMaterial({color:0xffffff, roughness:.4, metalness:.1})
);
ball.position.set(0,.35,3); ball.castShadow=true; scene.add(ball);

/* ---------- Confetti ---------- */
const confetti = [];
function spawnConfetti(){
  for(let i=0;i<260;i++){
    const c = new THREE.Mesh(
      new THREE.PlaneGeometry(.18,.28),
      new THREE.MeshStandardMaterial({color:palette[i%palette.length], side:THREE.DoubleSide, emissive:palette[i%palette.length], emissiveIntensity:.4})
    );
    c.position.set((Math.random()-.5)*18, 10+Math.random()*8, (Math.random()-.5)*8);
    c.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    c.userData = {
      vy:-.04-Math.random()*.05,
      vx:(Math.random()-.5)*.04,
      vz:(Math.random()-.5)*.02,
      rx:(Math.random()-.5)*.1, ry:(Math.random()-.5)*.1
    };
    scene.add(c); confetti.push(c);
  }
}

/* ---------- Flag (animated cloth via vertex sin) ---------- */
const flagGeo = new THREE.PlaneGeometry(6,4,30,20);
const flagMat = new THREE.MeshStandardMaterial({vertexColors:true, side:THREE.DoubleSide, roughness:.85});
const colors = [];
const pos = flagGeo.attributes.position;
// Simplified SA flag: green Y, gold/white/red/blue/black bands
const c = new THREE.Color();
for(let i=0;i<pos.count;i++){
  const x = pos.getX(i), y = pos.getY(i);
  // Normalize
  const u = (x+3)/6, v=(y+2)/4;
  let hex = 0x007a4d;
  if(v>0.66) hex = 0xde3831;       // red top
  else if(v<0.34) hex = 0x002395;  // blue bottom
  // Y shape from left
  const yArm = Math.abs(v-0.5) < (0.18 + u*0.12);
  if(yArm && u<0.55) hex = 0x007a4d;
  if(yArm && u<0.5){
    // gold/white edges
    const edge = Math.abs(v-0.5);
    if(edge>0.10 && edge<0.18) hex = 0xffffff;
  }
  // Black triangle on hoist
  if(u<0.3 && Math.abs(v-0.5) < 0.16 - u*0.3) hex = 0x000000;
  c.setHex(hex);
  colors.push(c.r,c.g,c.b);
}
flagGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
const flag = new THREE.Mesh(flagGeo, flagMat);
flag.position.set(-8, 6, -2); flag.rotation.y = .4;
scene.add(flag);

// Flag pole
const pole = new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,10,12), new THREE.MeshStandardMaterial({color:0xdddddd, metalness:.8, roughness:.3}));
pole.position.set(-11, 5, -2); scene.add(pole);

/* ---------- Goal posts ---------- */
const postMat = new THREE.MeshStandardMaterial({color:0xffffff, roughness:.4});
const post1 = new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,4,16), postMat);
post1.position.set(-3,2,-8); scene.add(post1);
const post2 = post1.clone(); post2.position.x=3; scene.add(post2);
const crossbar = new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,6,16), postMat);
crossbar.rotation.z=Math.PI/2; crossbar.position.set(0,4,-8); scene.add(crossbar);

/* ---------- Animation loop ---------- */
const clock = new THREE.Clock();
let t = 0;
let goalTriggered = false;
const goalEl = null;

function loop(){
  const dt = clock.getDelta();
  t += dt;

  // Camera dolly (cinematic, auto, looping)
  const cyc = (t % 14)/14; // 14s ad loop
  const angle = cyc * Math.PI*2;
  camera.position.x = Math.sin(angle)*14;
  camera.position.z = Math.cos(angle)*14 + 4;
  camera.position.y = 5 + Math.sin(t*.4)*.6;
  camera.lookAt(0,2,0);

  // Players celebrate: jumping + arms up
  players.forEach((p,i)=>{
    const phase = t*4 + p.userData.basePhase + i;
    p.position.y = Math.max(0, Math.sin(phase)*.6);
    p.rotation.y = Math.sin(t*1.2 + i)*.4;
    // Arms wave
    p.userData.armL.rotation.z =  .6 + Math.sin(phase)*.8;
    p.userData.armR.rotation.z = -.6 - Math.sin(phase)*.8;
    p.userData.armL.position.y = 2.4 + Math.sin(phase)*.2;
    p.userData.armR.position.y = 2.4 + Math.sin(phase)*.2;
    // Knee bend
    p.userData.legL.rotation.x =  Math.sin(phase)*.4;
    p.userData.legR.rotation.x = -Math.sin(phase)*.4;
  });

  // Ball bouncing
  ball.position.y = .35 + Math.abs(Math.sin(t*3))*1.2;
  ball.rotation.x += dt*4; ball.rotation.z += dt*3;

  // Crowd bob
  scene.traverse(o=>{
    if(o.userData && o.userData.baseY !== undefined){
      o.position.y = o.userData.baseY + Math.sin(t*4 + o.userData.phase)*.25;
    }
  });

  // Flag wave
  const fp = flag.geometry.attributes.position;
  for(let i=0;i<fp.count;i++){
    const x = fp.getX(i), y = fp.getY(i);
    const u = (x+3)/6;
    const z = Math.sin(u*6 - t*3) * .4 * u + Math.sin(y*2 + t*2)*.05;
    fp.setZ(i, z);
  }
  fp.needsUpdate = true;

  // Confetti
  confetti.forEach(c=>{
    c.position.x += c.userData.vx;
    c.position.y += c.userData.vy;
    c.position.z += c.userData.vz;
    c.rotation.x += c.userData.rx;
    c.rotation.y += c.userData.ry;
    if(c.position.y < 0){
      c.position.y = 12 + Math.random()*4;
      c.position.x = (Math.random()-.5)*18;
    }
  });

  // Auto GOAL! flash every loop
  const inGoalWindow = (t % 14) > 6 && (t % 14) < 6.2;
  if(inGoalWindow && !goalTriggered){
    goalTriggered = true;
    if(goalEl){ goalEl.classList.remove('show'); void goalEl.offsetWidth; goalEl.classList.add('show'); }
    flashStadium();
  }
  if((t % 14) > 9) goalTriggered = false;

  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

function flashStadium(){
  const orig = greenFill.intensity;
  greenFill.color.set(0xffb612);
  greenFill.intensity = 6;
  setTimeout(()=>{ greenFill.color.set(0x00b870); greenFill.intensity = orig; }, 220);
}

spawnConfetti();
loop();

addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
